<span id="mobile-menu-button" data-turbo-permanent="true" class="mobile btn-mobile-menu">
  <i class="fa-solid fa-bars btn-mobile-menu__icon"></i>
  <i class="fa-solid fa-circle-xmark btn-mobile-close__icon hidden"></i>
</span>

<header id="sidebar" data-turbo-permanent="true" class="panel-cover {% if site.disable_landing_page %}panel-cover--collapsed{% endif %}"
  style="background-image: url({{ site.baseurl }}/images/cover.webp)">
  <div class="panel-main">

    <div class="panel-main__inner panel-inverted">
      <div class="panel-main__content">
        <a href="{{ site.baseurl }}/" title="link to home of {{ site.title }}">
          <img src="{{ site.baseurl }}/images/profile.webp" class="user-image" alt="My Profile Photo" width="200" height="200">
          <h1 class="panel-cover__title panel-title">{{ site.title }}</h1>
        </a>
        <hr class="panel-cover__divider">
        <p class="panel-cover__description">{{ site.description }}</p>
        <hr class="panel-cover__divider panel-cover__divider--secondary">

        <div class="navigation-wrapper">

          <nav class="cover-navigation cover-navigation--primary">
            <ul class="navigation">
              <li class="navigation__item"><a href="{{ site.baseurl }}/about" title="link to {{ site.title }} about" class="blog-button">About</a></li>
              <li class="navigation__item"><a href="{{ site.baseurl }}/blog/" title="link to {{ site.title }} blog" class="blog-button">Blog</a></li>
              <li class="navigation__item"><a href="{{ site.baseurl }}/links" title="link to {{ site.title }} links" class="blog-button">Links</a></li>
            </ul>
          </nav>

          <nav class="cover-navigation navigation--social">
            <ul class="navigation">

              {% for link in site.data.social_links %}
                {% assign author_val = site.author[link.author_key] %}
                {% if author_val %}
                <li class="navigation__item">
                  <a href="{{ link.url_prefix }}{{ author_val }}"
                    title="{{ link.title_prefix }}{{ author_val }}{{ link.title_suffix }}" target="_blank" rel="noopener noreferrer">
                    {% if link.icon_family %}
                    <i class="{{ link.icon_family }} fa-{{ link.icon }}"></i>
                    {% else %}
                    <i class="fa-solid fa-{{ link.icon }}"></i>
                    {% endif %}
                    <span class="label">{{ link.name }}</span>
                  </a>
                </li>
                {% endif %}
              {% endfor %}

              <!-- RSS -->
              <li class="navigation__item">
                <a href="{{ site.baseurl }}/feed.xml" title="Subscribe" target="_blank" rel="noopener noreferrer">
                  <i class="fa-solid fa-rss"></i>
                  <span class="label">RSS</span>
                </a>
              </li>

            </ul>
          </nav>

        </div>

      </div>

    </div>

    <div class="panel-cover--overlay"></div>
  </div>
</header>
