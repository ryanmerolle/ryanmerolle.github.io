<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <!-- jekyll-seo-tag emits twitter:title with property= (incorrect); override with spec-compliant name= -->
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  
  <meta name="twitter:image" content="{% if page.image.path %}{{ page.image.path | absolute_url }}{% else %}{{ site.image.path | absolute_url }}{% endif %}">
  <meta property="og:image:type" content="image/webp">

  {% unless page.image.path %}
  <!-- Fallback overrides for non-post pages since jekyll-seo-tag skips global image generation -->
  <meta property="og:image" content="{{ site.image.path | absolute_url }}">
  <meta property="og:image:alt" content="{{ site.image.alt }}">
  
  {% if site.image.width %}
  <meta property="og:image:width" content="{{ site.image.width }}">
  {% endif %}
  {% if site.image.height %}
  <meta property="og:image:height" content="{{ site.image.height }}">
  {% endif %}
  {% endunless %}
  {% if page.robots %}<meta name="robots" content="{{ page.robots }}">{% endif %}

  <!-- Preconnect for external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Roboto+Slab:wght@300;400&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Favicons -->
  <link rel="icon" href="{{ site.baseurl }}/assets/favicons/favicon.ico" sizes="32x32">
  <link rel="icon" href="{{ site.baseurl }}/assets/favicons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/favicons/apple-touch-icon.png">
  <link rel="manifest" href="{{ site.baseurl }}/manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">

  <!-- Stylesheet & Feed -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/stylesheets/main.css?{{ site.time | date: '%s' }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">

  <!-- Hotwire Turbo -->
  <script defer src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/dist/turbo.es2017-umd.js"></script>

  {% include gtm-head.html %}
</head>
