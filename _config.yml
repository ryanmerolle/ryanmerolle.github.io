---
# Site settings
title: "Ryan Merolle"
description: "Ryan Merolle / Network Engineering / Infrastructure Automation"
url: "https://www.merolle.net"
image: 
  path: "/images/favicons/favicon-194x194.png"
logo: "/images/profile.webp"
# baseurl: '/jekyll-uno'
# google_analytics: 'UA-XXXXXX-X'
# disable_landing_page: true

author:
  name: "Ryan Merolle"
  # email:
  github_username: ryanmerolle
  gitlab_username: ryanmerolle
  linkedin_username: ryanmerolle
  twitter_username: ryanmerolle

social:
  name: Ryan Merolle
  links:
    - https://x.com/ryanmerolle
    - https://www.facebook.com/ryanmerolle
    - https://www.linkedin.com/in/ryanmerolle
    - https://github.com/ryanmerolle
    - https://gitlab.com/ryanmerolle

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
      layout: 'post'

# Build settings
destination: _site
paginate: 10
paginate_path: "/blog/page:num/"
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: 
  - jekyll-paginate
  - jekyll-llmstxt
  - jekyll-seo-tag

exclude:
  - .dockerignore
  - .github
  - .gitignore
  - .pre-commit-config.yaml
  - .rumdl_cache
  - .yamllint.yaml
  - Dockerfile
  - README.md
  - docker-compose.yml
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

include:
  - _pages
