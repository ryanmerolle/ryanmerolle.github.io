---
# Site settings
title: "Ryan Merolle"
description: "Networks / Infra Automation / DevOps"
url: "https://www.merolle.net"
image:
  path: "https://www.merolle.net/assets/images/profile.webp"
  alt: "Ryan Merolle - Networks / Infra Automation / DevOps"
logo: "/assets/images/profile.webp"

twitter:
  username: "ryanmerolle"
  card: "summary_large_image"

author:
  name: "Ryan Merolle"
  twitter: "ryanmerolle"
  # email:

google_tag_manager: "GTM-KMGNXRGF"

social:
  name: Ryan Merolle
  links:
    - https://x.com/ryanmerolle
    - https://www.linkedin.com/in/ryanmerolle
    - https://github.com/ryanmerolle
    - https://gitlab.com/ryanmerolle

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
      layout: 'post'

# Build settings
destination: _site
paginate: 10
paginate_path: "/blog/page:num/"
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
  sass_dir: assets/stylesheets/sass
  style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins:
  - jekyll-paginate
  - jekyll-llmstxt
  - jekyll-seo-tag

exclude:
  - .github
  - .gitignore
  - .pre-commit-config.yaml
  - .rumdl.toml
  - .rumdl_cache
  - .yamllint.yaml
  - AGENTS.md
  - Dockerfile
  - README.md
  - docker-compose.yml
  - prek.toml
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

include:
  - _pages
