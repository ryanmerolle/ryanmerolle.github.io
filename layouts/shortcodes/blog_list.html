{{ $sorted_blogs := sort hugo.Data.links_blogs "name" }} {{ range $blog :=
$sorted_blogs }}
<article class="link-card">
  <div class="link-card__header">
    <h2 class="link-card__title">
      <a href="{{ $blog.url }}" target="_blank" rel="noopener"
        >{{ $blog.name }}</a
      >
    </h2>
    <div class="link-card__icons">
      <a
        href="{{ $blog.url }}"
        title="External Link"
        target="_blank"
        rel="noopener"
        class="link-icon"
        aria-label="{{ $blog.name }} Website"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 512 512"
          width="20"
          height="20"
          aria-hidden="true"
          focusable="false"
          fill="currentColor"
        >
          <path
            d="M432 320h-32a16 16 0 0 0 -16 16v112H64V128h144a16 16 0 0 0 16-16V80a16 16 0 0 0 -16-16H48a48 48 0 0 0 -48 48v336a48 48 0 0 0 48 48h352a48 48 0 0 0 48-48V336a16 16 0 0 0 -16-16zm-181.7-65.7 131.7-131.7V176a16 16 0 0 0 16 16h32a16 16 0 0 0 16-16V48a16 16 0 0 0 -16-16H304a16 16 0 0 0 -16 16v32a16 16 0 0 0 16 16h53.5L225.8 227.8a16 16 0 0 0 0 22.6l22.6 22.6a16 16 0 0 0 22.6-.1z"
          />
        </svg>
      </a>
    </div>
  </div>
  {{ if $blog.author }}
  <div class="link-card__meta">By {{ $blog.author }}</div>
  {{ end }} {{ if $blog.description }}
  <div class="link-card__description">{{ $blog.description }}</div>
  {{ end }}
</article>
{{ end }}
