{{ define "main" }}
<article class="post-container post-container--single">
{{ partial "post-header.html" . }}

  <div class="post">
    {{ .Content }}
    <h2>All Tags</h2>
    <ul class="tags-list tags-list--stacked">
      {{ range .Data.Terms.Alphabetical }}
      <li>
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a> <span class="taxonomy-sort__count">({{ .Count }})</span>
      </li>
      {{ end }}
    </ul>
  </div>
</article>
{{ end }}
