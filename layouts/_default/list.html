{{ define "main" }}
<article class="post-container post-container--single">
{{ partial "post-header.html" . }}

  <div class="post">
    {{ .Content }}
    <ul>
{{   range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a> ({{ .Date.Format "2006-01-02" }})
      </li>
{{   end }}
    </ul>
{{   if or .Paginator.HasPrev .Paginator.HasNext }}
    {{ partial "pagination.html" . }}
{{   end }}
  </div>
</article>
{{ end }}
