{{ define "main" }}
<article class="post-container post-container--single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post">
    {{ .Content }}
    <ul>
      {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a> ({{ .Date.Format
        "2006-01-02" }})
      </li>
      {{ end }}
    </ul>
    {{ partial "pagination.html" . }}
  </div>
</article>
{{ end }}
