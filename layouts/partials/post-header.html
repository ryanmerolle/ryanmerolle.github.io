{{- /*
  post-header.html
  Renders the common article header: <article> open + <header> with <h1>.
  Used by _default/single.html, _default/list.html, and _default/terms.html.

  Input: Page context (.)
*/ -}}
<article class="post-container post-container--single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
